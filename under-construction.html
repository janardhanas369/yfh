  <style>
    /* Standalone under-construction hero — full screen, dark gradient */
    .uc-hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem 4rem;
      background: linear-gradient(135deg, var(--text-dark), var(--dark-2));
      overflow: hidden;
    }
    .uc-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 85% 15%, rgba(184, 214, 77, 0.22), transparent 50%),
        radial-gradient(circle at 10% 90%, rgba(201, 213, 149, 0.18), transparent 50%);
    }
    .uc-hero .uc-inner {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
    }
    .uc-hero .uc-card-box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(184, 214, 77, 0.18);
      border-radius: var(--radius-xl);
      padding: clamp(2rem, 6vw, 3.5rem);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow-lift);
    }
    .uc-hero .uc-card-box .top {
      height: 6px;
      background: var(--primary);
      width: 80px;
      margin: 0 auto 1.75rem;
      border-radius: var(--radius-full);
    }
    .uc-hero h2 { color: var(--white); font-size: clamp(1.6rem, 4vw, 2.1rem); }
    .uc-hero .uc-desc {
      margin: 0.75rem auto 0;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.75);
      max-width: 440px;
    }
    /* Override countdown for dark theme */
    .uc-hero .uc-countdown .uc-unit .uc-val {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(184, 214, 77, 0.25);
      color: var(--primary);
    }
    .uc-hero .uc-countdown .uc-unit .uc-lab { color: rgba(255, 255, 255, 0.55); }
    .uc-hero .uc-eyebrow { color: var(--accent); }
    .uc-hero .uc-eyebrow .dot { background: var(--primary); }
    .uc-hero .uc-illustration .ring1 { background: rgba(184, 214, 77, 0.18); }
    .uc-hero .uc-illustration .ring2 { background: rgba(184, 214, 77, 0.28); }
  </style>
</head>
<body data-page="home">

  <div id="site-header"></div>

    <section class="uc-hero">

            </div>

          <div class="uc-countdown" id="ucCountdown"></div>

  <!-- Standalone countdown — populates #ucCountdown (30 days from load) -->
  <script>
    (function () {
      "use strict";
      var cd = document.getElementById("ucCountdown");
      if (!cd) return;
      var target = Date.now() + 30 * 24 * 60 * 60 * 1000;
      function unit(v, l) {
        return '<div class="uc-unit"><div class="uc-val">' + String(v).padStart(2, "0") +
               '</div><div class="uc-lab">' + l + "</div></div>";
      }
      function tick() {
        var diff = target - Date.now();
        if (diff < 0) diff = 0;
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        cd.innerHTML = unit(d, "Days") + unit(h, "Hours") + unit(m, "Mins") + unit(s, "Secs");
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
